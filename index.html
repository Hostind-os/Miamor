<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Guarrita 💕</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💗</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Quicksand', 'Segoe UI', Verdana, sans-serif;
    background: linear-gradient(135deg, #ffb3d9 0%, #ffa8d4 20%, #e0aef5 40%, #b3c6f7 60%, #ffb8dd 80%, #ff9fd0 100%);
    background-size: 400% 400%;
    animation: gradientMove 20s ease infinite;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 40px;
    color: #6b3f5a;
    position: relative;
    overflow-x: hidden;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* --- corazones flotantes --- */
  .floating-hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .floating-heart {
    position: absolute;
    bottom: -50px;
    font-size: 1.5em;
    opacity: 0.55;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
  }

  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.65; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-110vh) translateX(20px) rotate(20deg); opacity: 0; }
  }

  /* --- fondo con fotos --- */
  .bg-slideshow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }

  .bg-slideshow::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,179,217,0.9), rgba(224,174,245,0.9), rgba(179,198,247,0.9));
    z-index: 1;
  }

  .bg-slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: fadeSlide 40s infinite;
    filter: saturate(0.9) brightness(1.05);
  }

  @keyframes fadeSlide {
    0% { opacity: 0; }
    5% { opacity: 1; }
    14% { opacity: 1; }
    19% { opacity: 0; }
    100% { opacity: 0; }
  }

  /* --- encabezado --- */
  .header-wrap {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 10px;
    animation: dropIn 0.9s ease both;
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3.6em;
    font-weight: 700;
    color: #a83c74;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6), 0 6px 20px rgba(168,60,116,0.35);
    line-height: 1.1;
  }

  .subtitle {
    font-size: 1.05em;
    font-weight: 600;
    margin-top: 6px;
    margin-bottom: 45px;
    color: #8a4a6d;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 2;
    animation: dropIn 0.9s ease 0.15s both;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: -30px 0 40px;
    color: #c2417d;
    font-size: 1.1em;
    opacity: 0.85;
    position: relative;
    z-index: 2;
  }

  .divider span.line {
    width: 50px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d05c9e, transparent);
  }

  /* --- tarjetas --- */
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    width: 100%;
    max-width: 1200px;
    position: relative;
    z-index: 2;
  }

  .card {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 28px;
    padding: 32px 26px;
    width: 320px;
    box-shadow: 0 14px 34px rgba(168, 60, 116, 0.28);
    border: 2px solid rgba(255, 255, 255, 0.7);
    text-align: center;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    opacity: 0;
    transform: translateY(30px);
    animation: cardIn 0.7s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.25s; }
  .card:nth-child(2) { animation-delay: 0.45s; }
  .card:nth-child(3) { animation-delay: 0.65s; }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 22px 44px rgba(168, 60, 116, 0.38);
  }

  .card-icon {
    font-size: 2.3em;
    margin-bottom: 6px;
    filter: drop-shadow(0 4px 8px rgba(168,60,116,0.25));
  }

  .card-title {
    font-size: 1.25em;
    font-weight: 700;
    color: #ab2f6f;
    margin-bottom: 6px;
    line-height: 1.25;
  }

  .card-date {
    font-size: 0.88em;
    font-weight: 600;
    color: #b382a3;
    margin-bottom: 22px;
    text-transform: capitalize;
  }

  .time-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .time-box {
    background: rgba(255, 255, 255, 0.75);
    border-radius: 16px;
    padding: 14px 5px;
    box-shadow: inset 0 0 0 1px rgba(255,182,213,0.7);
    transition: transform 0.2s ease;
  }

  .time-box:hover {
    transform: scale(1.05);
  }

  .time-number {
    font-size: 1.85em;
    font-weight: 700;
    color: #c2417d;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .time-label {
    font-size: 0.68em;
    font-weight: 700;
    color: #a86b8d;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 5px;
  }

  .footer {
    margin-top: 55px;
    font-size: 0.85em;
    color: #b382a3;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .buttons-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-top: 45px;
    position: relative;
    z-index: 2;
  }

  .fun-btn {
    position: relative;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.05em;
    color: #ffffff;
    background: linear-gradient(135deg, #ff8fc7, #d876e8);
    border: none;
    padding: 16px 26px;
    border-radius: 24px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(199, 76, 156, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 150px;
  }

  .fun-btn:nth-child(2) {
    background: linear-gradient(135deg, #ff9fb0, #ff6f91);
  }

  .fun-btn:nth-child(3) {
    background: linear-gradient(135deg, #c9a3ff, #9d7cff);
  }

  .fun-btn:hover {
    transform: translateY(-4px) scale(1.04);
    box-shadow: 0 16px 32px rgba(199, 76, 156, 0.5);
  }

  .fun-btn:active {
    transform: translateY(0) scale(0.97);
  }

  .fun-btn .count {
    font-size: 0.8em;
    font-weight: 600;
    opacity: 0.9;
    background: rgba(255,255,255,0.25);
    padding: 2px 10px;
    border-radius: 12px;
  }

  @media (max-width: 400px) {
    .card { width: 100%; }
    h1 { font-size: 2.6em; }
  }
</style>
</head>
<body>

  <div class="bg-slideshow" id="bgSlideshow"></div>
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="header-wrap">
    <h1>Mi Guarrita</h1>
  </div>
  <p class="subtitle">Los días de mi niñita</p>
  <div class="divider"><span class="line"></span>💗<span class="line"></span></div>

  <div class="cards" id="cards"></div>

  <div class="buttons-wrap" id="buttonsWrap"></div>

  <div class="footer"></div>

<script>
  const events = [
    { title: "El día más feliz", icon: "🌸", date: "2024-09-20T00:00:00" },
    { title: "El día en que me volví a enamorar", icon: "🌷", date: "2025-11-13T00:00:00" },
    { title: "Mi vida entera", icon: "🌺", date: "2026-06-29T00:00:00" }
  ];

  const photos = [
    "fotos/PHOTO-2025-02-22-23-43-25.jpg",
    "fotos/PHOTO-2025-02-22-23-43-25__1_.jpg",
    "fotos/WhatsApp_Image_2026-07-06_at_3_36_20_PM.jpeg",
    "fotos/WhatsApp_Image_2026-07-14_at_11_51_25_PM.jpeg",
    "fotos/WhatsApp_Image_2026-07-14_at_11_51_25_PM__1_.jpeg",
    "fotos/WhatsApp_Image_2026-07-14_at_11_51_25_PM__4_.jpeg",
    "fotos/WhatsApp_Image_2026-07-14_at_11_51_25_PM__5_.jpeg",
    "fotos/WhatsApp_Image_2026-07-14_at_11_51_26_PM.jpeg",
    "fotos/WhatsApp_Image_2026-07-15_at_12_01_42_AM.jpeg",
    "fotos/WhatsApp_Image_2026-07-15_at_12_02_36_AM.jpeg"
  ];

  const slideshow = document.getElementById('bgSlideshow');
  const slideDuration = 40; // segundos, debe coincidir con la animación CSS
  photos.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'bg-slide';
    slide.style.backgroundImage = `url('${src}')`;
    slide.style.animationDelay = `${(slideDuration / photos.length) * i}s`;
    slideshow.appendChild(slide);
  });

  const heartsContainer = document.getElementById('floatingHearts');
  const heartEmojis = ['💗', '💕', '💖', '💓', '🌸'];
  for (let i = 0; i < 22; i++) {
    const heart = document.createElement('div');
    heart.className = 'floating-heart';
    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = `${Math.random() * 100}%`;
    heart.style.fontSize = `${1 + Math.random() * 1.5}em`;
    heart.style.animationDuration = `${8 + Math.random() * 10}s`;
    heart.style.animationDelay = `${Math.random() * 15}s`;
    heartsContainer.appendChild(heart);
  }

  const cardsContainer = document.getElementById('cards');

  events.forEach((ev, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-icon">${ev.icon}</div>
      <div class="card-title">${ev.title}</div>
      <div class="card-date">${formatDate(ev.date)}</div>
      <div class="time-grid">
        <div class="time-box"><div class="time-number" id="days-${i}">0</div><div class="time-label">Días</div></div>
        <div class="time-box"><div class="time-number" id="hours-${i}">0</div><div class="time-label">Horas</div></div>
        <div class="time-box"><div class="time-number" id="minutes-${i}">0</div><div class="time-label">Minutos</div></div>
        <div class="time-box"><div class="time-number" id="seconds-${i}">0</div><div class="time-label">Segundos</div></div>
      </div>
    `;
    cardsContainer.appendChild(card);
  });

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    return d.toLocaleDateString('es-ES', options);
  }

  function updateCounters() {
    const now = new Date();
    events.forEach((ev, i) => {
      const start = new Date(ev.date);
      let diff = now - start;

      if (diff < 0) diff = 0;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById(`days-${i}`).textContent = days.toLocaleString('es-ES');
      document.getElementById(`hours-${i}`).textContent = hours;
      document.getElementById(`minutes-${i}`).textContent = minutes;
      document.getElementById(`seconds-${i}`).textContent = seconds;
    });
  }

  updateCounters();
  setInterval(updateCounters, 1000);

  // ---------- Botones con contador compartido (vía API en Vercel) ----------
  const buttonsData = [
    { key: 'btn_añañaña', label: 'añañaña', emoji: '🥺' },
    { key: 'btn_teextraño', label: 'Te extraño', emoji: '💌' },
    { key: 'btn_ovulando', label: 'estoy ovulando', emoji: '🌚' }
  ];

  const buttonsWrap = document.getElementById('buttonsWrap');

  async function getAllCounts() {
    try {
      const res = await fetch('/api/counts');
      if (!res.ok) throw new Error('respuesta no ok');
      return await res.json();
    } catch (err) {
      console.warn('No se pudieron leer los contadores (¿API no desplegada aún?)', err);
      return {};
    }
  }

  async function registerClick(key) {
    try {
      const res = await fetch(`/api/click?key=${encodeURIComponent(key)}`);
      if (!res.ok) throw new Error('respuesta no ok');
      const data = await res.json();
      return data.count;
    } catch (err) {
      console.warn('No se pudo registrar el click (¿API no desplegada aún?)', err);
      return null;
    }
  }

  buttonsData.forEach(btn => {
    const el = document.createElement('button');
    el.className = 'fun-btn';
    el.innerHTML = `<span>${btn.emoji} ${btn.label}</span><span class="count" id="count-${btn.key}">0</span>`;
    el.addEventListener('click', async () => {
      const newCount = await registerClick(btn.key);
      if (newCount !== null) {
        document.getElementById(`count-${btn.key}`).textContent = newCount;
      }
    });
    buttonsWrap.appendChild(el);
  });

  async function refreshAllCounts() {
    const counts = await getAllCounts();
    buttonsData.forEach(btn => {
      const span = document.getElementById(`count-${btn.key}`);
      if (span && counts[btn.key] !== undefined) span.textContent = counts[btn.key];
    });
  }

  refreshAllCounts();
  setInterval(refreshAllCounts, 4000);
</script>

</body>
</html>
